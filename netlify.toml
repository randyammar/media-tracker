[build]
  command = "rm -rf .next && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[redirects]]
  from = "/auth/sign-in"
  to = "/sign-in"
  status = 301
  force = true

[[redirects]]
  from = "/auth/sign-up"
  to = "/sign-up"
  status = 301
  force = true
